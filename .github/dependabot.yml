version: 2
updates:
  # Rust dependencies for dev/agent-master
  - package-ecosystem: "cargo"
    directory: "/"
    target-branch: "dev/agent-master"
    schedule:
      interval: "weekly"
    groups:
      rust-dependencies:
        patterns:
          - "*"
    commit-message:
      prefix: "chore(deps)"

  # GitHub Actions for dev/agent-master
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "dev/agent-master"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(ci)"
